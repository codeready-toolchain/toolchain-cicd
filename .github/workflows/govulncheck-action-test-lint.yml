name: Test and Lint 'govulncheck-action'
on:
  pull_request:
    branches:
    - master
    paths:
    - 'govulncheck-action/**'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: govulncheck-action/go.mod

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles ('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Test
      working-directory: govulncheck-action
      run: |
        make test

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version-file: govulncheck-action/go.mod

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.2

    - name: Lint
      working-directory: govulncheck-action
      run: golangci-lint run --path-mode=abs --config=.golangci.yml --verbose ./...